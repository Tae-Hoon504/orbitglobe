<!DOCTYPE html>
<html>
<head>
  <title>ISS Tracker - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a12; color: white; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
    
    .top-left-controls {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* USB 연결 버튼 디자인 (배경과 어울리게) */
.usb-connect-btn {
  background: rgba(15, 52, 96, 0.8);
  border: 1px solid #00d2ff;
  color: #00d2ff;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  backdrop-filter: blur(5px); /* 뒤 배경 살짝 비치게 */
}

/* 미니 지구본 아이콘 */
.mini-globe {
  width: 24px;
  height: 24px;
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%2300d2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>');
  background-size: contain;
  background-repeat: no-repeat;
}


    /* 1. 가장 왼쪽 사이드바 영역 */
    .side-bar { 
      width: 4vw;           /* 화면 너비의 4%를 차지 */
      min-width: 50px;      /* 너무 작아져서 글자가 깨지는 것 방지 */
      max-width: 80px;      /* 너무 커져서 자리를 많이 차지하는 것 방지 */
      background-color: #08080e; 
      border-right: 1px solid #16213e; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .vertical-title { 
  /* 기존 transform: rotate(-90deg)는 삭제합니다 */
  writing-mode: vertical-lr;      /* 세로 방향 쓰기 설정 */
  text-orientation: upright;      /* 글자 방향을 똑바로 세움 */
  color: #00d2ff; 
  font-weight: bold; 
  /* 2.0rem 대신 vw 단위를 쓰면 화면 크기에 비례해서 글자가 커집니다 */
    font-size: 1.8vw;     
    min-size: 2.0rem;     /* 최소 글자 크기 보장 */
  letter-spacing: 5px;            /* 글자 사이 간격 (위아래 간격이 됩니다) */
  text-transform: uppercase;      /* 대문자 고정 */
  opacity: 0.9;
  text-shadow: 0 0 8px rgba(0, 210, 255, 0.5); /* 은은한 네온 효과 추가 */
}

    /* 전체 화면 가로 분할 컨테이너 (사이드바 제외 영역) */
    .main-container { display: flex; flex: 1; height: 100vh; flex-wrap: nowrap; }
    
    /* 왼쪽 섹션 (시각 정보) */
    .info-panel { flex: 1; min-width: 450px; padding: 2vw; /* 고정 px 대신 화면 너비에 비례한 여백을 줍니다 */ background: linear-gradient(180deg, #16213e 0%, #0a0a12 100%); 
                  border-right: 2px solid #00d2ff; display: flex; flex-direction: column; align-items: center; justify-content: center; 
                  gap: 2vh; /* [꿀팁] 요소들 사이의 위아래 간격을 화면 높이에 비례해서 벌려줍니다 */}
    
    /* 오른쪽 섹션 (제어판) */
    .control-panel { flex: 1; min-width: 450px; padding: 2vw; /* 고정 px 대신 화면 너비에 비례한 여백을 줍니다 */ display: flex; flex-direction: column; 
    align-items: center; justify-content: center; 
    gap: 2vh; /* [꿀팁] 요소들 사이의 위아래 간격을 화면 높이에 비례해서 벌려줍니다 */}

    /* 이미지 박스: 지도 크기(360x180)와 동일하게 수정 */
    .iss-img-box { width: 30vw;    /* 360px 대신 화면 너비의 35%만큼 커지게 설정 */
    height: 15vw;   /* 비율을 유지하며 함께 확대 */
    max-width: 600px; /* 너무 무한정 커지는 것 방지 */
    min-width: 360px; /* 노트북 이하에서는 원본 크기 유지 */ background-color: #000;  /* 배경을 검은색으로 설정 */
  /* background 속성에서 url 부분을 지우고 아래처럼 설정합니다 */
  background-position: center;
  background-size: cover; 
                   border-radius: 5px; border: 1px solid #00d2ff; transition: 0.5s; }
    .target-label { font-size: 1.4rem; font-weight: bold; color: #ffca28; margin: 15px 0; background: rgba(0,210,255,0.1); padding: 8px 25px; border-radius: 20px; border: 1px solid rgba(0,210,255,0.3); }

    /* 미니 지도 칸 */
    .map-container { width: 30vw;    /* 360px 대신 화면 너비의 35%만큼 커지게 설정 */
    height: 15vw;   /* 비율을 유지하며 함께 확대 */
    max-width: 600px; /* 너무 무한정 커지는 것 방지 */
    min-width: 360px; /* 노트북 이하에서는 원본 크기 유지 */ background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/1280px-Blue_Marble_2002.png?20230723103457') center/cover;
                     position: relative; border-radius: 5px; border: 1px solid #aaa; margin: 15px 0; background-size: 100% 100%; }
    .iss-point { width: 12px; height: 12px; background-color: #ff0000; border: 2px solid white; border-radius: 50%; position: absolute; 
                 box-shadow: 0 0 10px #ff0000; transform: translate(-50%, -50%); z-index: 10; 
                 transition: left 0.5s linear, top 0.5s linear;}

    /* 수치 표시 */
    .coords-display { font-size: 1.5rem; font-weight: bold; color: #00d2ff; margin-bottom: 5px; }
    
    /* 슬라이더 및 버튼 스타일 (기존과 동일) */
    .slidecontainer { width: 85%; background: #16213e; padding: 20px; border-radius: 12px; margin: 12px 0; border: 1px solid #0f3460; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
    .slider-title { font-size: 1.1rem; font-weight: bold; color: #00d2ff; }
    .slider-range { font-size: 0.9rem; color: #888; font-weight: bold; }
    .slider { width: 100%; -webkit-appearance: none; height: 10px; background: #0f3460; border-radius: 5px; outline: none; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #00d2ff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #00d2ff; }
    .button { background: #0f3460; border: 2px solid #00d2ff; color: white; padding: 12px 25px; border-radius: 25px; cursor: pointer; margin: 8px; font-weight: bold; transition: 0.3s; }
    .button:hover { background: #00d2ff; color: #0a0a12; transform: scale(1.05); }
    /* '나의 위성 띄우기' 버튼 전용 스타일 (기존 .button 하단에 추가) */
.button-green { 
    background: #0f3d2e;      /* 쨍하지 않은 짙은 초록 배경 */
    border: 2px solid #33cc99; /* 에메랄드빛 초록 테두리 */
    color: white; 
    padding: 12px 25px; 
    border-radius: 25px; 
    cursor: pointer; 
    margin: 8px; 
    font-weight: bold; 
    transition: 0.3s; 
}

/* 마우스를 올렸을 때 (Hover) */
.button-green:hover { 
    background: #33cc99;      /* 테두리 색으로 배경 채우기 */
    color: #0a0a12;           /* 글자색은 어둡게 반전 */
    transform: scale(1.05);   /* 살짝 커지는 효과 동일 적용 */
}
  </style>
</head>
<body>

<div class="side-bar">
  <div class="vertical-title">ORBIT GLOBE</div>
</div>

<div class="main-container">
  <div class="info-panel" style="position: relative;"> 
<div class="top-left-controls">
      <button class="usb-connect-btn" onclick="connectSerial() style="pointer-events: auto !important; cursor: pointer !important;">USB 연결</button>
     </div>
    <h2>📡 위성 정보 센터</h2>
    <div class="iss-img-box" id="targetImg"></div>
    <div class="target-label" id="targetName">대기 모드</div>
    
    <div class="coords-display">
      위도: <span id="latTxt">0</span>° | 경도: <span id="lonTxt">0</span>°
    </div>
    <div class="map-container">
      <div id="issMarker" class="iss-point" style="left: 50%; top: 50%;"></div>
    </div>
    <p style="color: #888;">위성 위치 지도</p>
  </div>

  <div class="control-panel">
    <h2>🛠️ 위성 제어 센터</h2>
    
    <div class="slidecontainer">
      <div class="slider-header">
        <span class="slider-range">-55</span>
        <span class="slider-title">위도: <span id="latDisplay">0</span>°</span>
        <span class="slider-range">70</span>
      </div>
      <input type="range" min="-55" max="70" value="0" class="slider" id="latSlider" oninput="previewUI()">
    </div>

    <div class="slidecontainer">
      <div class="slider-header">
        <span class="slider-range">-180</span>
        <span class="slider-title">경도: <span id="lonDisplay">0</span>°</span>
        <span class="slider-range">180</span>
      </div>
      <input type="range" min="-180" max="180" value="0" class="slider" id="lonSlider" oninput="previewUI()">
    </div>

    <div>
      <button class="button" onclick="sendManualCommand()">위성 수동 제어</button>
      <button class="button" style="border-color: #ff4d4d;" onclick="resetPos()">초기화</button>
    </div>

    <hr style="width:80%; border: 0.5px solid #0f3460; margin: 20px 0 5px 0;">

    <div style="display: flex; gap: 60px; align-items: flex-end; width: 85%; margin: 20px auto 0 auto;  justify-content: center;">
  
  <div style="display: flex; flex-direction: column; gap: 10px; width: 45%;">
    <button class="button" style="border-color: #a29bfe; width: 100%;" onclick="startMode('orbit', '궤도 운동 재현')">🔄 ISS 공전 궤도 재현 모드</button>
    <button class="button" style="border-color: #00d2ff; width: 100%;" onclick="startMode('equator', '적도 공전 모드')">🌍 적도 위도 공전 모드</button>
    <button class="button" style="border-color: #ff9f43; width: 100%;" onclick="startMode('korea orbit', '37도 위도 공전')">🇰🇷 37도 위도 공전 모드</button>
  </div>

  <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; width: 30%;">
    <div style="width: 100%; height: 160px; border-radius: 8px; overflow: hidden; border: 1px solid #444; background-color: #000;">
      <img src="issproject/naro.jpg" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
    
    <input type="file" id="imageUpload" accept="image/*" onchange="uploadUserImage(event)" style="display: none;">
    <button class="button-green" onclick="document.getElementById('imageUpload').click()" style="width: 100%; font-size: 11px;">
      🚀 나의 위성 띄우기
    </button>
  </div>
</div>

    <p id="modeStatus" style="margin-top: 20px; color: #00ff00;">● 대기 중</p>
  </div>
</div>

<script>
  let port;
  let reader;
  let inputBuffer = ""; // 시리얼 데이터를 모으는 버퍼
  let autoUpdateInterval;
  let isUserAdjusting = false;
  let isLocked = true; // [수정] 처음부터 잠긴 상태로 시작합니다!

  let isCustomImageUploaded = false; // 커스텀 이미지 업로드 여부 저장
  let customImageUrl = "";           // 업로드된 이미지 데이터 저장

  // --- [신규 추가] 시스템 잠금 및 해제 함수 ---
function controlLock(isLockedNow) {
  isLocked = isLockedNow; // 전역 변수 상태 업데이트
  
  // 모든 버튼과 슬라이더를 가져옵니다.
  const buttons = document.querySelectorAll('button');
  const sliders = document.querySelectorAll('.slider');
  const statusText = document.getElementById('modeStatus');

  buttons.forEach(btn => {
    // USB 연결 버튼은 어떤 상황에서도 '잠금'에서 제외!
    if (btn.classList.contains('usb-connect-btn')) {
      btn.disabled = false;           // 무조건 활성화
      btn.style.opacity = "1.0";      // 무조건 밝게
      btn.style.cursor = "pointer";    // 무조건 손가락 모양
      btn.style.pointerEvents = "auto"; // 무조건 클릭 가능
    } else {
      // 나머지 버튼들만 잠금/해제
      btn.disabled = isLockedNow;
      btn.style.opacity = isLockedNow ? "0.5" : "1.0";
      btn.style.cursor = isLockedNow ? "not-allowed" : "pointer";
    }
  });

  sliders.forEach(s => {
    s.disabled = isLockedNow;
  });

  // 상태 메시지 표시
  if (isLockedNow) {
    statusText.innerText = "● [SYSTEM BUSY] 명령 처리 중...";
    statusText.style.color = "#ffca28"; // 대기 중인 노란색
  }
}
   
  // 1. [추가] USB 시리얼 연결 함수
  async function connectSerial() {
    try {
      port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });
      
      // 연결되자마자 잠금 함수 실행!
      controlLock(true);
      
      document.getElementById('modeStatus').innerText = "● 시스템 부팅 및 원점 복귀 중...";
      document.getElementById('modeStatus').style.color = "#00ff00";
      
      readLoop(); // 데이터 읽기 루프 시작
    } catch (err) {
      console.error("연결 실패:", err);
      alert("USB 장치를 선택하지 않았거나 연결에 실패했습니다.");
    }
  }

  // 2. [추가] ESP32에서 보내는 데이터를 실시간으로 읽는 루프
  async function readLoop() {
    const textDecoder = new TextDecoderStream();
    const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
    reader = textDecoder.readable.getReader();

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      if (value) {
        inputBuffer += value;
        // 한 줄(\n)이 완성되었는지 확인
        if (inputBuffer.includes("\n")) {
          let lines = inputBuffer.split("\n");
          inputBuffer = lines.pop(); // 마지막 미완성 줄은 버퍼에 남김
          
          lines.forEach(line => {
            if (line.trim().startsWith("{")) {
              try {
                const data = JSON.parse(line);
                const statusText = document.getElementById('modeStatus');

                // 1. 아두이노가 보낸 상세 메시지가 있다면 화면에 즉시 반영
                if (data.msg) {
                  // [신규 추가] 아두이노의 상세 상태를 텍스트로 표시
                  statusText.innerText = "● " + data.msg;

                 // 1순위: 'Ready'나 '완료'면 무조건 초록색 (가장 중요)
    if (data.msg === "Ready" || data.msg.includes("완료") || data.msg.includes("완주")) {
        statusText.style.color = "#00ff00"; 
        if (data.msg === "Ready") controlLock(false);
    } 
    // 2순위: '준비'나 '대기'가 들어있으면 노란색
    else if (data.msg.includes("준비") || data.msg.includes("대기")) {
        statusText.style.color = "#ffcc00"; 
    }
    // 3순위: 그 외 '시작'이나 '주행'은 초록색
    else if (data.msg.includes("진행")) {
        statusText.style.color = "#ff6b6b";
    }
                  
                // [추가] 1. 아두이노가 "나 이제 준비됐어"라고 하면 잠금 해제!
                if (data.msg === "Ready") {
                  console.log(">>> 시스템 잠금 해제 (Ready 신호 수신)");
                  controlLock(false); 
                  return; // Ready 메시지일 때는 아래 지도 업데이트를 건너뜁니다.
                }
                if (data.lat !== undefined && data.lon !== undefined) {
                if (!isUserAdjusting) {
                  updateUIFromSerial(data.lat, data.lon);
                }
                }
              } catch (e) { }
            }
          });
        }
      }
    }
  }

  // 3. [추가] ESP32로 명령을 보내는 통합 함수 (기존 fetch 대체)
  async function sendToESP(commandObj) {
    // 이미 잠겨있다면 중복 명령 방지
  if (isLocked) return;
    
    if (port && port.writable) {
      // [이 줄이 핵심!] 명령 보내자마자 바로 잠금 메시지 띄우기
    controlLock(true);
      const encoder = new TextEncoder();
      const writer = port.writable.getWriter();
      const jsonStr = JSON.stringify(commandObj) + "\n";
      await writer.write(encoder.encode(jsonStr));
      writer.releaseLock();
    } else {
      console.warn("USB가 연결되지 않았습니다.");
    }
  }

  // 4. [기존 로직 유지] 지도를 업데이트하는 함수
  function updateUIFromSerial(lat, lon) {
    lat = parseFloat(lat);
    lon = parseFloat(lon);
    if (isNaN(lat)) lat = 0;
    if (isNaN(lon)) lon = 0;

    lat = Math.max(-90, Math.min(90, lat));
    lon = Math.max(-180, Math.min(180, lon));

    document.getElementById('latTxt').innerText = lat.toFixed(2);
    document.getElementById('lonTxt').innerText = lon.toFixed(2);

    let xPercent = ((lon + 180) / 360) * 100;
    let yPercent = 100 - ((lat + 90) / 180) * 100;
    let marker = document.getElementById('issMarker');
    marker.style.left = xPercent + "%";
    marker.style.top = yPercent + "%";
  }

  // 5. [기존 함수 수정] 모드 시작
  function startMode(mode, name) {
    isUserAdjusting = false;
    const targetName = document.getElementById('targetName');
    const targetImg = document.getElementById('targetImg');
    const statusText = document.getElementById('modeStatus');

    targetName.innerText = name;
    statusText.innerText = "● " + name + " 모드 활성화";
    
    // [수정] 사용자가 이미지를 올리지 않았을 때만 기본 이름/이미지 적용
  if (!isCustomImageUploaded) {
    targetName.innerText = name;
    if (mode === 'orbit') {
      targetImg.style.backgroundImage = "url('issproject/iss.jpg')";
    } else if (mode === 'equator') {
      targetImg.style.backgroundImage = "url('issproject/equator.jpg')";
    } else if (mode === 'korea orbit') {
      targetImg.style.backgroundImage = "url('issproject/37latitude.jpg')";
    }
  } else {
    // 이미지를 올린 상태라면 이름만 살짝 바꿔줍니다 (예: 커스 위성 - 적도 공전 중)
    targetName.innerText = "커스텀 위성 (" + name + ")";
  }

  // 상태 메시지와 명령 전송은 이미지와 상관없이 실행되어야 함
  statusText.innerText = "● " + name + " 모드 활성화";
  if (mode === 'orbit') {
    statusText.style.color = "#a29bfe";
    sendToESP({mode: 3});
  } else if (mode === 'equator') {
    statusText.style.color = "#00d2ff";
    sendToESP({mode: 4});
  } else if (mode === 'korea orbit') {
    statusText.style.color = "#ff9f43";
    sendToESP({mode: 5});
  }
}

 // 6. [수정] 함수 이름을 sendManualCommand로 변경!
function sendManualCommand() { 
  if (isLocked) return; // 이미 시스템이 바쁘면 클릭 무시
  isUserAdjusting = false;
  let lat = document.getElementById('latSlider').value;
  let lon = document.getElementById('lonSlider').value;

  document.getElementById('targetName').innerText = "수동 조작 모드";
  document.getElementById('modeStatus').innerText = "● 위성 이동 중... (동기화 중)";
  document.getElementById('modeStatus').style.color = "#00d2ff";
  
  // 2. [핵심] 시스템 잠금 함수 호출! 
  // 이 안에서 메시지도 "● [SYSTEM BUSY]..."로 바뀌고 버튼도 어두워집니다.
  controlLock(true);

  // 진짜 데이터를 보내는 300번 줄의 sendToESP 함수를 호출함
  sendToESP({mode: 1, tLat: parseInt(lat), tLon: parseInt(lon)});
}

  // 7. [기존 함수 수정] 초기화
  function resetPos() {
    isUserAdjusting = false;
    isCustomImageUploaded = false; // [추가] 커스텀 이미지 사용 해제!
    document.getElementById('latSlider').value = 0;
    document.getElementById('lonSlider').value = 0;
    document.getElementById('latDisplay').innerText = "0";
    document.getElementById('lonDisplay').innerText = "0";
    document.getElementById('targetName').innerText = "대기 모드";
    document.getElementById('targetImg').style.backgroundImage = "none";
    document.getElementById('targetImg').style.backgroundColor = "#000";

    // 초기화 명령(mode 0) 전송
    sendToESP({mode: 0, tLat: 0, tLon: 0, reset: 1});

    document.getElementById('modeStatus').innerText = "● 시스템 대기 중 (원점 복귀)";
    document.getElementById('modeStatus').style.color = "#ff4d4d";
  }

  function previewUI() {
    isUserAdjusting = true;
    let lat = document.getElementById('latSlider').value;
    let lon = document.getElementById('lonSlider').value;
    document.getElementById('latDisplay').innerText = lat;
    document.getElementById('lonDisplay').innerText = lon;
  }

function uploadUserImage(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {

      // 1. [추가] 이제부터 커스텀 이미지를 사용한다고 표시합니다!
      isCustomImageUploaded = true;
      
      // 위쪽 '위성 정보 센터'의 이미지 박스 ID가 'targetImg'인지 확인해 주세요!
      const targetImg = document.getElementById('targetImg');
      const targetName = document.getElementById('targetName');
      
      if(targetImg) {
        targetImg.style.backgroundImage = "url('" + e.target.result + "')";
        targetImg.style.backgroundSize = "cover";
        targetImg.style.backgroundPosition = "center";
      }
      
      if(targetName) {
        targetName.innerText = "커스텀 위성";
      }
      
      // 상태 메시지도 업데이트
      const statusText = document.getElementById('modeStatus');
      if(statusText) {
        statusText.innerText = "● 커스텀 위성: 궤도 안착 성공";
        statusText.style.color = "#33cc99";
      }
    };
    reader.readAsDataURL(file);
  }
}
  // 페이지 로드 직후 실행하여 USB 연결 버튼 외 모두 잠금
controlLock(true); 
document.getElementById('modeStatus').innerText = "● USB 연결이 필요합니다.";
</script>
</body>
